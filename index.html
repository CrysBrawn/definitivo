<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASC Automação</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#e0eaf4,#cfdef3);font-family:'Segoe UI',Roboto,sans-serif;padding:30px 20px}
.container{max-width:1300px;margin:auto}
.card{background:#fff;border-radius:28px;box-shadow:0 20px 40px rgba(0,0,0,.1);margin-bottom:30px}
.card-header{background:#1a3c5c;padding:20px 28px;color:#fff}
.card-body{padding:28px}
label{font-weight:600;margin-bottom:8px;display:block}
input,select,textarea{width:100%;padding:10px 14px;border-radius:40px;border:1px solid #cbd5e1}
textarea{border-radius:20px;min-height:80px}
button{background:#1a3c5c;color:#fff;border:none;border-radius:40px;padding:12px 24px;font-weight:600;cursor:pointer;margin-right:10px}
button:hover{background:#0f2c44}
.campos-f1,.campos-f2{display:none}
.preview-item{background:#f8fafc;padding:12px;border-radius:16px;margin-top:10px;
display:flex;justify-content:space-between;align-items:center}
.preview-item small{color:#475569}
.btn-del{background:#fee2e2;color:#b91c1c;border:none;border-radius:20px;padding:6px 14px;cursor:pointer}
.btn-del:hover{background:#fecaca}
</style>
</head>

<body>
<div class="container">

<div class="card">
<div class="card-header">
  <h2>⚡ Gerador de Atendimentos ASC</h2>
</div>

<div class="card-body">

<label>Tipo de atendimento</label>
<select id="fase" onchange="atualizarCampos()">
  <option value="fase1">🔧 Fase 1 – Pós atendimento</option>
  <option value="fase2">📅 Fase 2 – Agendamento completo</option>
</select>

<label>Segurado*</label>
<input id="seg">

<label>Telefone*</label>
<input id="tel">

<label>Matrícula*</label>
<input id="mat">

<label>Agente*</label>
<input id="ag">

<label>Serviço*</label>
<input id="srv">

<div class="campos-f1">
  <label>Cia*</label>
  <input id="cia">
  <label>Placa*</label>
  <input id="pla">
</div>

<div class="campos-f2">
  <label>Data*</label>
  <input type="date" id="data">
  <label>Horário*</label>
  <input type="time" id="hora">
  <label>Endereço*</label>
  <textarea id="end"></textarea>
</div>

<br>
<button onclick="adicionarAtendimento()">➕ Adicionar atendimento</button>
<button onclick="gerarCSV()">📄 Exportar CSV</button>

<div id="contador" style="margin-top:20px;font-weight:600"></div>
<div id="preview" style="margin-top:10px"></div>

</div>
</div>

</div>

<script>
let registros = [];
let fases = [];

function atualizarCampos(){
  const fase = document.getElementById("fase").value;
  document.querySelector(".campos-f1").style.display = fase === "fase1" ? "block" : "none";
  document.querySelector(".campos-f2").style.display = fase === "fase2" ? "block" : "none";
}
atualizarCampos();

function csvSafe(v){
  if(v === null || v === undefined) return '""';
  return '"' + String(v).replace(/"/g,'""').replace(/\r?\n/g,' ') + '"';
}

function limparCampos(){
  document.querySelectorAll("input, textarea").forEach(e => e.value = "");
}

function adicionarAtendimento(){
  const fase = document.getElementById("fase").value;
  const seg = seg_ = document.getElementById("seg").value.trim();
  const tel = document.getElementById("tel").value.trim();
  const mat = document.getElementById("mat").value.trim();
  const ag  = document.getElementById("ag").value.trim();
  const srv = document.getElementById("srv").value.trim();

  if(!seg || !tel || !mat || !ag || !srv){
    alert("Preencha todos os campos obrigatórios.");
    return;
  }

  let linha = [];

  if(fase === "fase1"){
    const cia = document.getElementById("cia").value.trim();
    const pla = document.getElementById("pla").value.trim();
    if(!cia || !pla){
      alert("Preencha Cia e Placa.");
      return;
    }
    linha = [seg,tel,mat,ag,srv,cia,pla];
  } else {
    const data = document.getElementById("data").value;
    const hora = document.getElementById("hora").value;
    const end  = document.getElementById("end").value.trim();
    if(!data || !hora || !end){
      alert("Preencha Data, Horário e Endereço.");
      return;
    }
    linha = [seg,tel,mat,ag,srv,data,hora,end];
  }

  registros.push(linha.map(csvSafe));
  fases.push(fase);
  limparCampos();
  atualizarPreview();
}

function removerLinha(i){
  registros.splice(i,1);
  fases.splice(i,1);
  atualizarPreview();
}

function atualizarPreview(){
  const preview = document.getElementById("preview");
  const contador = document.getElementById("contador");

  if(registros.length === 0){
    preview.innerHTML = "<p>Nenhum atendimento adicionado.</p>";
    contador.innerHTML = "";
    return;
  }

  contador.innerHTML = `📦 Total de atendimentos: ${registros.length}`;

  preview.innerHTML = registros.map((r,i)=>`
    <div class="preview-item">
      <div>
        <strong>${r[0].replace(/"/g,"")}</strong><br>
        <small>${r[1].replace(/"/g,"")} | ${r[2].replace(/"/g,"")} | ${fases[i]}</small>
      </div>
      <button class="btn-del" onclick="removerLinha(${i})">🗑️</button>
    </div>
  `).join("");
}

function gerarCSV(){
  if(registros.length === 0){
    alert("Nenhum atendimento adicionado.");
    return;
  }

  const fase = fases[0];
  const cab = fase === "fase1"
    ? ["Segurado","Telefone","Matricula","Agente","Servico","Cia","Placa"]
    : ["Segurado","Telefone","Matricula","Agente","Servico","Data","Horario","Endereco"];

  const csv = cab.join(",") + "\n" + registros.map(l => l.join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "asc_input.csv";
  a.click();
}
</script>

</body>
</html>
